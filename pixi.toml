[workspace]
channels = ["conda-forge"]
name = "manuscript-audit"
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.13,<3.14"
pip = "*"

[pypi-dependencies]
manuscript-audit = { path = ".", editable = true }
duckdb = ">=1.5.0,<2"
pydantic = ">=2.12.0,<3"
pyyaml = ">=6.0,<7"
pytest = ">=9.0.0,<10"
ruff = ">=0.15.0,<0.16"
typer = ">=0.21.0,<0.22"

[tasks]
format = { cmd = "ruff format ." }
lint = { cmd = "ruff check ." }
test = { cmd = "pytest", env = { PYTHONPATH = "src" } }
parse = { cmd = "python -m manuscript_audit.cli parse", env = { PYTHONPATH = "src" } }
route = { cmd = "python -m manuscript_audit.cli route", env = { PYTHONPATH = "src" } }
validate = { cmd = "python -m manuscript_audit.cli validate", env = { PYTHONPATH = "src" } }
audit-core = { cmd = "python -m manuscript_audit.cli audit-core", env = { PYTHONPATH = "src" } }
audit-standard = { cmd = "python -m manuscript_audit.cli audit-standard", env = { PYTHONPATH = "src" } }
verify-revision = { cmd = "python -m manuscript_audit.cli verify-revision", env = { PYTHONPATH = "src" } }
