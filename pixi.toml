[workspace]
channels = ["conda-forge"]
name = "manuscript-audit"
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = "3.13.*"
pip = "*"
pydantic = ">=2.12,<3"
pyyaml = ">=6,<7"
typer = ">=0.21,<0.22"
duckdb = ">=1.5,<2"
pytest = ">=9,<10"
ruff = ">=0.15,<0.16"

[tasks]
format = { cmd = "ruff format ." }
lint = { cmd = "ruff check ." }
test = { cmd = "pytest", env = { PYTHONPATH = "src" } }
parse = { cmd = "python -m manuscript_audit.cli parse", env = { PYTHONPATH = "src" } }
route = { cmd = "python -m manuscript_audit.cli route", env = { PYTHONPATH = "src" } }
validate = { cmd = "python -m manuscript_audit.cli validate", env = { PYTHONPATH = "src" } }
audit-core = { cmd = "python -m manuscript_audit.cli audit-core", env = { PYTHONPATH = "src" } }
